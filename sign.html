<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/all.css">
    <title>Glow. Sign In</title>

<body style="background-color:#ffffff">
   
   
   
<!-- navigation -->
   <section id="header">
      <div id="navbar">
         <div id="logo" class="logo-img">
            <img id="logo" src="images/logo.png" alt="">
         </div>
         
         <div>
            <i class="far fa-times"></i>
         </div>
         
      </div>
   </section>
<!-- navigation  ENDS here-->



<!-- general body goes here-->

   <section class="email-prompt gen-padd gen-marg">
      <h3>Login: </h3>
      <div class="form">
         <input type="email" name="email" id="email" placeholder="Enter E-mail address...">
         <input type="submit" value="Sign In" class="normal1">
      </div>
   </section>
   
   
   <section class="sign-btn gen-padd gen-marg" id="btn">
      <button id="g-btn"><h1>Sign in with Google</h1></button>
      <br>
      
      <button id="f-btn"><h1>Sign in with Facebook</h1></button>
      <br>
       
      <button id="t-btn"><h1>Sign in with Twitter</h1></button>
      <br>
      
      <h4>Not yet registered?</h4>
      <button id="r-btn"><h1>Register</h1></button></h1>
      
      <div id="signin" class="submit gen-padd gen-marg"><a href="index.html"><button class="normal submit">Continue as Guest</button></a></div>
      
   </section>
   
<!-- Footer items -->
   <footer>
